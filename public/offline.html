<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — DailySpend</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #EFEAE0;
      color: #1F2A24;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 320px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }
    p {
      color: #5B6660;
      font-size: 14px;
      line-height: 1.5;
    }
    .peso {
      font-size: 40px;
      color: #B8892F;
      margin-bottom: 12px;
    }
    button {
      margin-top: 16px;
      background: #2F6F4E;
      color: #EFEAE0;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="peso">₱</div>
    <h1>No internet connection</h1>
    <p>DailySpend can't be reached right now. Once your connection is back, it'll work again automatically.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
